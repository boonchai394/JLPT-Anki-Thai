name: Build Anki Deck

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install genanki

      - run: python build_decks.py

      - uses: actions/upload-artifact@v4
        with:
          name: AnkiDeck
          path: export_apkg/*.apkg